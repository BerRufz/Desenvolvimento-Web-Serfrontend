<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Viaoda+Libre&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <form action="#" method="get" autocomplete="off" class="form">
      <fieldset class="form__fieldset">
        <legend class="form__title">Login</legend>

        <label for="user" class="form__label">Usuário</label>
        <input
          type="text"
          id="user"
          name="user"
          required
          autofocus
          class="form__input"
        />

        <label for="password" class="form__label">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autofocus
          class="form__input"
        />

        <div class="form__action">
          <input type="submit" value="login" class="btn btn-primary" />
          <a href="cadastro.html" class="btn btn-secondary">Cadastre-se</a>
          <a href="#" class="form__action__aside">Esqueci minha senha</a>
        </div>
      </fieldset>
    </form>
  </body>
</html>
